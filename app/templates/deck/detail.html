{% extends "base.html" %}

{% block title %} - Deck Details{% endblock %}

{% block content %}

<div class="container">

    {% include "components/deck_header.html" %}

    <div class="row g-4">

        {% for card in deck.cards %}

            <div class="col-md-4 col-lg-3">

                {% include "components/deck_card.html" %}

            </div>

        {% else %}

            <div class="col-12">

                <div class="aler alert-info">

                    This deck doesn't contain any card yet.

                </div>

            </div>

        {% endfor %}

    </div>

</div>

{% endblock %}
