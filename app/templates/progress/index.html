{% extends "base.html" %}

{% block title %} - Collection Progress{% endblock %}

{% block content %}

<h2 class="mb-4">Collection Progress</h2>

{% for set in sets %}

    <div class="card mb-3">

        <div class="card-body">

            <div class="text-center mb-3">

                <img
                    src="{{ set.logo }}"
                    alt="set.set_name"
                    class="img-fluid"
                    style="max-height: 100px;"
                >

            </div>

            <h5>
                {{ set.set_name }}
            </h5>

            <small class="text-muted">
                {{ set.series }}
            </small>

            <p class="mt-2">
                {{ set.owned }} / {{ set.total }} cards
            </p>

            <div class="progress">

                <div
                    class="progress-bar"
                    role="progressbar"
                    style="width: {{ set.progress }}%"
                >
                    {{ set.progress }}%
                </div>

            </div>

        </div>

    </div>
    
{% endfor %}

{% endblock %}
