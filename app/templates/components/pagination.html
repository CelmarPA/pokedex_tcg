{% if pagination.total_pages > 1 %}

<nav aria-label="Pagination">

    <ul class="pagination justify-content-center">

        <!-- Previous -->
        <li class="page-item {% if not pagination.has_previous %}disabled{% endif %}">
            <a
                href="?page={{ pagination.previous_page if pagination.has_previous else pagination.current_page }}"
                class="page-link"
            >
                Previous
            </a>
        </li>

        <!-- Pages -->
        {% for page in pagination.visible_pages %}

            {% if page %}

                <li class="page-item {% if page == pagination.current_page %}active{% endif %}">
                    <a
                        href="{{ filters.build_url(page) }}"
                        class="page-link"
                    >
                        {{ page }}
                    </a>
                </li>
            {% else %}

                <li class="page-item disabled">
                    <span class="page-link">…</span>
                </li>

            {% endif %}

        {% endfor %}

        <!-- Next -->
        <li class="page-item {% if not pagination.has_next %}disabled{% endif %}">
            <a
                href="?page={{ pagination.next_page if pagination.has_next else pagination.current_page }}"
                class="page-link"
            >
                Next
            </a>
        </li>

    </ul>

</nav>

{% endif %}
