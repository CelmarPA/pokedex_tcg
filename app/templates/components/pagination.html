{% if pagination.total_pages > 1 %}

<nav class="mt-4">

    <ul class="pagination justify-content-center">

        {% if pagination.has_previous %}

            <li class="page-item">

                <a
                    class="page-link"
                    href="{{ filters.build_url(pagination.previous_page) }}"
                >
                    Previous
                </a>

            </li>

        {% endif %}

        {% for page in pagination.visible_pages %}

            {% if page %}

                <li class="page-item {% if page == pagination.current_page %}active{% endif %}">

                    <a
                        class="page-link"
                        href="{{ filters.build_url(page) }}"
                    >
                        {{ page }}
                    </a>

                </li>

            {% else %}

                <li class="page-item disabled">

                    <span class="page-link">

                        ...

                    </span>

                </li>

            {% endif %}

        {% endfor %}

        {% if pagination.has_next %}

            <li class="page-item">

                <a
                    class="page-link"
                    href="{{ filters.build_url(pagination.next_page) }}"
                >
                    Next
                </a>

            </li>

        {% endif %}

    </ul>

</nav>

{% endif %}
