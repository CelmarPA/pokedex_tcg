<div class="card deck-card h-100 shadow-sm border-0">

    <div class="card-body text-center">

        <img
            src="{{ card.card_data.images.small }}"
            alt="{{ card.card_data.name }}"
            class="card-img-top mb-3"
        >

        <h5 class="card-title mb-1">
            {{ card.card_data.name }}
        </h5>

        <p class="text-muted small mb-3">

            {{ card.card_data.supertype }}

            {% if card.card_data.types %}
                • {{ card.card_data.types | join(", ") }}
            {% endif %}

            {% if card.card_data.hp %}
                • HP {{ card.card_data.hp }}
            {% endif %}

        </p>

        <div class="btn-group mb-3" role="group">

            <form
                action="{{ url_for('deck.remove_card', deck_id=deck.id, card_id=card.card_id) }}"
                method="POST"
                class="deck-action-form"
                data-action="remove"
            >
                <input
                    type="hidden"
                    name="csrf_token"
                    value="{{ csrf_token() }}"
                >

                <button
                    type="submit"
                    class="btn btn-outline-warning"
                >
                    −
                </button>

            </form>

            <button
                class="btn btn-outline-secondary deck-quantity"
                disabled
            >
                {{ card.quantity }}
            </button>

            <form
                action="{{ url_for('deck.add_card', deck_id=deck.id, card_id=card.card_id) }}"
                method="POST"
                class="deck-action-form"
            >

                <input
                    type="hidden"
                    name="csrf_token"
                    value="{{ csrf_token() }}"
                >

                <button
                    type="submit"
                    class="btn btn-outline-success"
                >
                    +
                </button>

            </form>

        </div>

        <form
            action="{{ url_for('deck.update_quantity', deck_id=deck.id, card_id=card.card_id) }}"
            method="POST"
            class="deck-action-form mb-3"
        >

            <input
                type="hidden"
                name="csrf_token"
                value="{{ csrf_token() }}"
            >

            <label class="form-label small mb-1">
                Quantity
            </label>

            <div class="input-group">

                <input
                    type="number"
                    name="quantity"
                    value="{{ card.quantity }}"
                    min="1"
                    max="60"
                    class="form-control text-center deck-quantity-input"
                >

                <button
                    type="submit"
                    class="btn btn-outline-primary"
                >
                    Update
                </button>

            </div>

        </form>

        <a
            href="{{ url_for('cards.card_detail', card_id=card.card_id) }}"
            class="btn btn-outline-primary btn-sm w-100"
        >
            View Details
        </a>

    </div>

</div>
